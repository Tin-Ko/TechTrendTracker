version: '3.8'

# Postgres is gone — structured data lives in Supabase (managed, free tier).
# Raw postings live on local disk at $JOB_POSTINGS_DIR (default /job_postings).
# Only RabbitMQ stays local: it decouples the scraper from the extraction
# worker and both processes run on the same machine.

services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge
